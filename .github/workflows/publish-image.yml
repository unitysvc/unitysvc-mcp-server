name: Publish MCP server image

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  # On PRs, build only (no push) — a Dockerfile or dependency break is caught
  # here instead of after merge when the push-to-main build runs.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # No registry login on PRs — nothing is pushed, and a PR build must not
      # need push credentials.
      - if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/unitysvc/unitysvc-mcp-server
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mcp-server
          cache-to: type=gha,scope=mcp-server,mode=max
          platforms: linux/amd64
