name: CI

# Lint, format, and test on every push to main and every PR. Mirrors the
# tooling the repo already uses locally (uv + ruff + pytest); no publish here
# — that stays in publish.yml, release-triggered.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # requires-python = ">=3.11"; cover the floor and the image's version.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      # --frozen also fails the build if uv.lock has drifted from pyproject —
      # so a dependency bump that forgets to relock is caught here.
      - name: Sync (locked)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Tests
        run: uv run pytest
